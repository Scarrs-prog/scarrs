<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scarrs Blackprint | Emperor Mode</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#050505;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* ===== LION INTRO SCREEN ===== */
#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:fadeOut 2s ease 4s forwards;
}

#intro h1{
font-family:'Playfair Display',serif;
font-size:4rem;
color:#d4af37;
animation:zoomLion 3s ease forwards;
}

@keyframes zoomLion{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* ===== NAVBAR ===== */
nav{
position:fixed;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h2{
font-family:'Playfair Display',serif;
color:#d4af37;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul a{
text-decoration:none;
color:#ccc;
transition:0.3s;
}
nav ul a:hover{color:#d4af37;}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4rem;
font-family:'Playfair Display',serif;
background:linear-gradient(90deg,#d4af37,#fff,#d4af37);
background-size:200% auto;
color:transparent;
-webkit-background-clip:text;
animation:shine 4s linear infinite;
}

@keyframes shine{
to{background-position:200% center;}
}

.hero p{
margin-top:20px;
color:#aaa;
font-size:1.2rem;
}

/* ===== MONEY COUNTER ===== */
.counter{
font-size:3rem;
margin-top:30px;
color:#d4af37;
}

/* ===== LOGIN MODAL ===== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:40px;
border-radius:20px;
width:300px;
text-align:center;
border:1px solid #d4af37;
}

.modal input{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
border:none;
color:white;
}

.modal button{
background:#d4af37;
color:black;
padding:10px;
border:none;
width:100%;
cursor:pointer;
}

/* ===== ADMIN DASHBOARD ===== */
.dashboard{
display:none;
padding:120px 10%;
}

.card{
background:#111;
padding:30px;
margin-bottom:20px;
border-radius:15px;
border:1px solid rgba(212,175,55,0.3);
transition:0.4s;
}

.card:hover{
box-shadow:0 0 25px rgba(212,175,55,0.4);
}

footer{
text-align:center;
padding:40px;
color:#777;
}
</style>
</head>
<body>

<!-- Sound -->
<audio id="introSound" src="https://www.soundjay.com/nature/lion-roar-01.mp3"></audio>

<!-- INTRO -->
<div id="intro">
<h1>🦁 SCARRS BLACKPRINT</h1>
</div>

<!-- NAV -->
<nav>
<h2>Emperor Panel</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#" onclick="openLogin()">Login</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Command. Control. Conquer.</h1>
<p>Dark Authority. Premium Empire Infrastructure.</p>
<div class="counter" id="money">$0</div>
</section>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Emperor Login</h3>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button onclick="enterDashboard()">Enter Empire</button>
</div>
</div>

<!-- DASHBOARD -->
<section class="dashboard" id="dashboard">
<h2 style="color:#d4af37;margin-bottom:30px;">Emperor Control Panel</h2>

<div class="card">Total Revenue: $128,500</div>
<div class="card">Active Members: 1,250</div>
<div class="card">System Growth: +37%</div>

</section>

<footer>
© 2026 Scarrs Blackprint Emperor Mode
</footer>

<script>

/* ===== PLAY SOUND ===== */
window.onload=function(){
document.getElementById("introSound").play();
};

/* ===== MONEY COUNTER ===== */
let count=0;
let target=250000;
let counter=document.getElementById("money");

let interval=setInterval(()=>{
count+=2500;
counter.innerHTML="$"+count.toLocaleString();
if(count>=target) clearInterval(interval);
},30);

/* ===== LOGIN ===== */
function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function enterDashboard(){
document.getElementById("loginModal").style.display="none";
document.getElementById("dashboard").style.display="block";
window.scrollTo(0,document.body.scrollHeight);
}

</script>

</body>
</html>
