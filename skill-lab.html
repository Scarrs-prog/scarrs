<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scarrs Skill Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#6366f1;
--text:#f1f5f9;
--muted:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
background:#020617;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

section{
padding:60px 8%;
}

.card{
background:var(--card);
padding:30px;
border-radius:16px;
margin-bottom:25px;
}

button{
background:var(--accent);
border:none;
padding:12px 22px;
border-radius:30px;
color:white;
cursor:pointer;
margin-top:10px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

.progress{
height:10px;
background:#334155;
border-radius:20px;
margin-top:10px;
}

.bar{
height:10px;
width:0%;
background:var(--accent);
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.course{
background:#020617;
padding:20px;
border-radius:14px;
cursor:pointer;
}

.hidden{display:none}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<nav>
<h2>Scarrs Skill Lab</h2>
<div>
<a href="#">Home</a>
<a href="#">Skill Lab</a>
</div>
</nav>


<!-- LOGIN -->

<section id="loginBox" class="card">
<h2>Login</h2>
<input id="nameInput" placeholder="Enter your name">
<button onclick="login()">Enter Skill Lab</button>
</section>


<!-- DASHBOARD -->

<section id="dashboard" class="hidden">

<div class="card">
<h2>Welcome <span id="user"></span></h2>

<p>Level <span id="level"></span></p>
<p>XP <span id="xp"></span>/100</p>

<div class="progress">
<div class="bar" id="xpBar"></div>
</div>

<p>🔥 Streak: <span id="streak"></span> days</p>

</div>


<!-- SKILL TREE -->

<div class="card">
<h2>Skill Tree</h2>

<div class="grid">

<div class="course" onclick="openCourse('design')">
🎨 Design
</div>

<div class="course" onclick="openCourse('writing')">
✍ Writing
</div>

<div class="course" onclick="openCourse('marketing')">
📈 Marketing
</div>

<div class="course" onclick="openCourse('ai')">
🤖 AI Tools
</div>

</div>

</div>


<!-- LEADERBOARD -->

<div class="card">
<h2>Leaderboard</h2>

<ol id="leaderboard">
</ol>

</div>


<!-- AI MENTOR -->

<div class="card">

<h2>AI Mentor</h2>

<textarea id="aiPrompt" placeholder="Ask mentor a learning question..."></textarea>

<button onclick="aiMentor()">Ask Mentor</button>

<p id="aiResponse"></p>

</div>

</section>



<!-- COURSE AREA -->

<section id="courseArea" class="hidden">

<div class="card">

<h2 id="courseTitle"></h2>

<video id="lessonVideo" controls></video>

<p id="lessonText"></p>

<textarea placeholder="Practice task here"></textarea>

<button onclick="completeLesson()">Complete Lesson (+20 XP)</button>

<button onclick="quiz()">Take Quiz</button>

<button onclick="back()">Back</button>

</div>

</section>



<!-- QUIZ -->

<section id="quizArea" class="hidden">

<div class="card">

<h2>Quiz</h2>

<p id="quizQ"></p>

<div id="quizOptions"></div>

</div>

</section>



<!-- CERTIFICATE -->

<section id="certArea" class="hidden">

<div class="card">

<h2>🎉 Course Completed</h2>

<button onclick="downloadCert()">Download Certificate</button>

<button onclick="back()">Back</button>

</div>

</section>


<script>

/* USER DATA */

let user = localStorage.getItem("user")
let xp = parseInt(localStorage.getItem("xp")) || 0
let level = parseInt(localStorage.getItem("level")) || 1
let streak = parseInt(localStorage.getItem("streak")) || 0

/* LOGIN */

function login(){

let name=document.getElementById("nameInput").value

localStorage.setItem("user",name)

updateDashboard()

}

/* DASHBOARD */

function updateDashboard(){

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("dashboard").classList.remove("hidden")

user=localStorage.getItem("user")

document.getElementById("user").innerText=user
document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level
document.getElementById("streak").innerText=streak

document.getElementById("xpBar").style.width=xp+"%"

updateLeaderboard()

}

/* COURSES */

const courses={
design:{
video:"https://www.w3schools.com/html/mov_bbb.mp4",
text:"Lesson: Design hierarchy and spacing"
},

writing:{
video:"https://www.w3schools.com/html/mov_bbb.mp4",
text:"Lesson: Writing powerful hooks"
},

marketing:{
video:"https://www.w3schools.com/html/mov_bbb.mp4",
text:"Lesson: Viral marketing basics"
},

ai:{
video:"https://www.w3schools.com/html/mov_bbb.mp4",
text:"Lesson: AI prompt engineering"
}
}


let currentCourse=""

/* OPEN COURSE */

function openCourse(name){

currentCourse=name

document.getElementById("dashboard").classList.add("hidden")
document.getElementById("courseArea").classList.remove("hidden")

document.getElementById("courseTitle").innerText=name.toUpperCase()

document.getElementById("lessonVideo").src=courses[name].video

document.getElementById("lessonText").innerText=courses[name].text

}


/* COMPLETE LESSON */

function completeLesson(){

xp+=20

if(xp>=100){

level++
xp=0

}

localStorage.setItem("xp",xp)
localStorage.setItem("level",level)

streak++

localStorage.setItem("streak",streak)

updateDashboard()

alert("Lesson Completed")

}


/* QUIZ */

function quiz(){

document.getElementById("courseArea").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

document.getElementById("quizQ").innerText="What improves UI?"

let ops=["Random spacing","Clear hierarchy","Too many colors"]

let html=""

ops.forEach((o,i)=>{

html+=`<p onclick="answer(${i})">${o}</p>`

})

document.getElementById("quizOptions").innerHTML=html

}


function answer(i){

if(i==1){

xp+=30

alert("Correct +30 XP")

}

back()

}


/* CERTIFICATE */

function downloadCert(){

let text="Certificate of Completion\n\nAwarded to "+user+"\nScarrs Skill Lab"

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="certificate.txt"

a.click()

}


/* AI MENTOR */

function aiMentor(){

let q=document.getElementById("aiPrompt").value

let answer="Mentor Tip: Practice daily and build real projects."

document.getElementById("aiResponse").innerText=answer

}


/* LEADERBOARD */

function updateLeaderboard(){

let board=document.getElementById("leaderboard")

board.innerHTML=`<li>${user} - Level ${level}</li>
<li>GuestUser - Level 2</li>
<li>DemoUser - Level 1</li>`

}


/* BACK */

function back(){

document.getElementById("quizArea").classList.add("hidden")
document.getElementById("courseArea").classList.add("hidden")
document.getElementById("certArea").classList.add("hidden")

document.getElementById("dashboard").classList.remove("hidden")

}


if(user){

updateDashboard()

}

</script>

</body>
</html>
