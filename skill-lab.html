<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scarrs Skill Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#6366f1;
--text:#f1f5f9;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
background:#020617;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
cursor:pointer;
}

section{
padding:60px 8%;
}

.card{
background:var(--card);
padding:30px;
border-radius:16px;
margin-bottom:25px;
}

button{
background:var(--accent);
border:none;
padding:10px 18px;
border-radius:20px;
color:white;
cursor:pointer;
margin-top:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.progress{
height:10px;
background:#334155;
border-radius:20px;
margin-top:10px;
}

.bar{
height:10px;
background:var(--accent);
width:0%;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.course{
background:#020617;
padding:20px;
border-radius:12px;
cursor:pointer;
}

.hidden{display:none}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}

.market-item{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.job{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<nav>

<h2>Scarrs Skill Lab</h2>

<div>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('market')">Marketplace</a>
<a onclick="show('freelance')">Freelance</a>
</div>

</nav>


<!-- LOGIN -->

<section id="loginBox" class="card">

<h2>Login</h2>

<input id="nameInput" placeholder="Enter name">

<button onclick="login()">Enter</button>

</section>


<!-- DASHBOARD -->

<section id="dashboard" class="hidden">

<div class="card">

<h2>Welcome <span id="user"></span></h2>

<p>Level: <span id="level"></span></p>

<p>XP: <span id="xp"></span>/100</p>

<div class="progress">
<div class="bar" id="xpBar"></div>
</div>

<p>🔥 Streak: <span id="streak"></span></p>

<p>💰 Wallet: $<span id="wallet"></span></p>

</div>


<!-- SKILLS -->

<div class="card">

<h2>Skill Courses</h2>

<div class="grid">

<div class="course" onclick="openCourse('design')">🎨 Design</div>

<div class="course" onclick="openCourse('writing')">✍ Writing</div>

<div class="course" onclick="openCourse('marketing')">📈 Marketing</div>

<div class="course" onclick="openCourse('ai')">🤖 AI Tools</div>

</div>

</div>


<!-- AI TEACHER -->

<div class="card">

<h2>AI Teacher</h2>

<textarea id="aiPrompt" placeholder="Ask learning question"></textarea>

<button onclick="aiTeacher()">Ask</button>

<p id="aiResponse"></p>

</div>

</section>


<!-- COURSE -->

<section id="courseArea" class="hidden">

<div class="card">

<h2 id="courseTitle"></h2>

<video id="lessonVideo" controls></video>

<p id="lessonText"></p>

<button onclick="completeLesson()">Complete Lesson (+20 XP)</button>

<button onclick="quiz()">Quiz</button>

<button onclick="show('dashboard')">Back</button>

</div>

</section>


<!-- QUIZ -->

<section id="quizArea" class="hidden">

<div class="card">

<h2>Quiz</h2>

<p id="quizQ"></p>

<div id="quizOps"></div>

</div>

</section>


<!-- MARKETPLACE -->

<section id="market" class="hidden">

<div class="card">

<h2>Skill Marketplace</h2>

<input id="skillName" placeholder="Skill name">
<input id="skillPrice" placeholder="Price">

<button onclick="addSkill()">List Skill</button>

<div id="marketList"></div>

</div>

</section>


<!-- FREELANCE HUB -->

<section id="freelance" class="hidden">

<div class="card">

<h2>Freelance Job Board</h2>

<input id="jobTitle" placeholder="Job title">
<textarea id="jobDesc" placeholder="Job description"></textarea>
<input id="jobPay" placeholder="Budget $">

<button onclick="postJob()">Post Job</button>

</div>

<div class="card">

<h2>Available Jobs</h2>

<div id="jobList"></div>

</div>

</section>


<script>

/* USER DATA */

let user=localStorage.getItem("user")

let xp=parseInt(localStorage.getItem("xp"))||0
let level=parseInt(localStorage.getItem("level"))||1
let streak=parseInt(localStorage.getItem("streak"))||0
let wallet=parseInt(localStorage.getItem("wallet"))||50

let market=JSON.parse(localStorage.getItem("market"))||[]
let jobs=JSON.parse(localStorage.getItem("jobs"))||[]


/* LOGIN */

function login(){

let name=document.getElementById("nameInput").value

localStorage.setItem("user",name)

updateDashboard()

}


/* DASHBOARD */

function updateDashboard(){

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("dashboard").classList.remove("hidden")

user=localStorage.getItem("user")

document.getElementById("user").innerText=user
document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level
document.getElementById("streak").innerText=streak
document.getElementById("wallet").innerText=wallet

document.getElementById("xpBar").style.width=xp+"%"

}


/* NAVIGATION */

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

renderMarket()
renderJobs()

}


/* COURSES */

const courses={

design:{
video:"https://www.w3schools.com/html/mov_bbb.mp4",
text:"Learn layout, spacing and UI hierarchy."
},

writing:{
video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
text:"Learn persuasive writing and hooks."
},

marketing:{
video:"https://www.w3schools.com/html/movie.mp4",
text:"Learn viral marketing."
},

ai:{
video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/bee.mp4",
text:"Learn AI tools and prompts."
}

}


function openCourse(name){

show("courseArea")

document.getElementById("courseTitle").innerText=name.toUpperCase()
document.getElementById("lessonVideo").src=courses[name].video
document.getElementById("lessonText").innerText=courses[name].text

}


/* COMPLETE LESSON */

function completeLesson(){

xp+=20

if(xp>=100){

level++
xp=0

}

streak++

localStorage.setItem("xp",xp)
localStorage.setItem("level",level)
localStorage.setItem("streak",streak)

updateDashboard()

alert("Lesson completed")

}


/* QUIZ */

function quiz(){

show("quizArea")

document.getElementById("quizQ").innerText="Good UI requires?"

let ops=["Random spacing","Clear hierarchy","Too many colors"]

let html=""

ops.forEach((o,i)=>{

html+=`<p onclick="answer(${i})">${o}</p>`

})

document.getElementById("quizOps").innerHTML=html

}

function answer(i){

if(i==1){

xp+=30
wallet+=5

alert("Correct! +30 XP + $5")

}

show("dashboard")
updateDashboard()

}


/* AI TEACHER */

function aiTeacher(){

let q=document.getElementById("aiPrompt").value.toLowerCase()

let res="Practice daily."

if(q.includes("design")) res="Study spacing and typography."
if(q.includes("marketing")) res="Focus on audience psychology."
if(q.includes("ai")) res="Practice prompt engineering."

document.getElementById("aiResponse").innerText=res

}


/* MARKETPLACE */

function addSkill(){

let name=document.getElementById("skillName").value
let price=document.getElementById("skillPrice").value

market.push({name,price})

localStorage.setItem("market",JSON.stringify(market))

renderMarket()

}

function renderMarket(){

let box=document.getElementById("marketList")

box.innerHTML=""

market.forEach((m,i)=>{

box.innerHTML+=`

<div class="market-item">

<b>${m.name}</b> - $${m.price}

<button onclick="buy(${i})">Buy</button>

</div>

`

})

}

function buy(i){

let price=market[i].price

if(wallet>=price){

wallet-=price

alert("Purchased!")

}

else{

alert("Not enough money")

}

localStorage.setItem("wallet",wallet)

updateDashboard()

}


/* FREELANCE JOB BOARD */

function postJob(){

let title=document.getElementById("jobTitle").value
let desc=document.getElementById("jobDesc").value
let pay=document.getElementById("jobPay").value

jobs.push({title,desc,pay,client:user})

localStorage.setItem("jobs",JSON.stringify(jobs))

renderJobs()

}

function renderJobs(){

let box=document.getElementById("jobList")

if(!box) return

box.innerHTML=""

jobs.forEach((j,i)=>{

box.innerHTML+=`

<div class="job">

<b>${j.title}</b>

<p>${j.desc}</p>

<p>Budget: $${j.pay}</p>

<p>Client: ${j.client}</p>

<button onclick="applyJob(${i})">Apply</button>

</div>

`

})

}

function applyJob(i){

wallet+=parseInt(jobs[i].pay)

localStorage.setItem("wallet",wallet)

alert("Job completed! Payment received.")

updateDashboard()

}


/* INIT */

if(user){

updateDashboard()

}

</script>

</body>
</html>
